# .github/workflows/deploy.yml — tag-triggered production deploy.
# Triggers: push of annotated v*.*.* tag.
# Pattern: self-hosted Jetson runner (no SSH needed, runner lives ON Jetson).
# Pipeline:
#   1. Block on `production` environment's Required Reviewers (human approval).
#   2. Re-tag the existing sha-XXXX image as semver (vX.Y.Z, vX.Y, vX, latest).
#   3. Run deploy/deploy.sh on the Jetson (the runner host).

name: Deploy

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: Deploy (Jetson)
    runs-on: [self-hosted, linux, arm64, jetson]
    # The production environment has Required Reviewers configured in
    # repo Settings → Environments → production. The workflow PAUSES
    # here until a reviewer clicks "Approve and deploy" in the GitHub UI.
    environment:
      name: production
      url: >-
        https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        # The Jetson's interactive sessions periodically docker-login by
        # hand, but the runner's exec env is a fresh shell without that
        # cached credential. Re-authenticate per workflow run.
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx (for imagetools manifest re-tagging)
        uses: docker/setup-buildx-action@v3

      - name: Re-tag the SHA image as semver (no rebuild)
        # The build job in ci.yml already produced ghcr.io/<repo>:sha-<short>
        # for this commit (because the tag points at a commit that was on
        # main and went through CI). Re-tag the SAME image as:
        #   v1.2.3 (the full tag we just pushed)
        #   v1.2   (the minor-version pointer)
        #   v1     (the major-version pointer)
        #   latest (the floating-latest pointer)
        # Downstream can pin to any granularity they want.
        env:
          TAG: ${{ github.ref_name }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMG_BASE="ghcr.io/${{ github.repository }}"
          SRC="${IMG_BASE}:sha-${SHORT_SHA}"

          MAJ="${TAG%%.*}"            # v1.2.3 → v1
          MIN="${TAG%.*}"             # v1.2.3 → v1.2

          for NEW in "$TAG" "$MIN" "$MAJ" "latest"; do
            echo "Re-tagging $SRC as ${IMG_BASE}:${NEW}"
            docker buildx imagetools create -t "${IMG_BASE}:${NEW}" "$SRC"
          done

      - name: Run deploy.sh on this Jetson
        # The runner lives on the Jetson, so deploy.sh runs locally — no SSH.
        # nvpmodel + jetson_clocks have NOPASSWD sudo (Step 0.0); STATE_DIR
        # was chowned to the runner user (Step D5); GHCR is logged in above.
        env:
          DEPLOY_ENV: production
        run: |
          chmod +x deploy/deploy.sh deploy/healthcheck.sh 
          bash deploy/deploy.sh "${{ github.ref_name }}"

      - name: Verify final /healthz response
        # Print the final /healthz response into the workflow log for
        # auditing — proves the deployed container reports the correct
        # power_mode and model_version that match the tag we just deployed.
        if: success()
        run: |
          echo "Final /healthz response:"
          curl -fsS http://localhost:8000/healthz | jq .