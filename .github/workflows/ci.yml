# .github/workflows/ci.yml — Part B five-stage CI pipeline
# Triggers: push (any branch), pull_request → main, workflow_dispatch
# Jobs: lint → (test, security-scan) → build → integration-test

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  # ===========================================================================
  # Stage 1: Lint — 程式碼風格與基本錯誤檢查（最便宜的關卡，先擋下來）
  # ===========================================================================
  lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install ruff
        run: pip install ruff==0.6.9

      - name: Run ruff check
        run: ruff check . --output-format=github

  # ===========================================================================
  # Stage 2a: Test — 跑 pytest 並要求 coverage ≥ 90%
  # 與 security-scan 並行執行（兩個都只 needs: lint）
  # ===========================================================================
  test:
    name: Pytest + coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install test dependencies
        # 不裝整份 requirements.txt — Jetson 用的 torch 在 x86 雲端裝不起來
        # 但要裝 opencv-python + paho-mqtt，因為 src/inference_node.py
        # 在 module 頂層 import 它們，沒裝連測試檔都 import 不進來
        run: |
          pip install \
            pytest==8.3.3 \
            pytest-cov==5.0.0 \
            pytest-mock==3.14.0 \
            opencv-python==4.10.0.84 \
            paho-mqtt==2.1.0

      - name: Run pytest with coverage gate (≥90%)
        # --ignore=tests/integration: integration test 要在 Jetson 上跑，
        # 雲端 runner 沒有 docker + GPU，會 fail
        run: |
          pytest tests/ \
            --ignore=tests/integration \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=90 \
            -v

      - name: Upload coverage HTML report
        # if: always() — 就算測試失敗也要上傳報告，方便除錯
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-html
          path: htmlcov/

  # ===========================================================================
  # Stage 2b: Security scan — Bandit + pip-audit
  # 與 test 並行執行
  # ===========================================================================
  security-scan:
    name: Bandit + pip-audit
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install security tools
        run: pip install bandit==1.7.10 pip-audit==2.7.3

      - name: Bandit (Python SAST)
        # -r 遞迴掃 src/、-ll 報告 Low 等級以上的問題
        run: bandit -r src/ -ll -c pyproject.toml

      - name: pip-audit (CVE scan on dependencies)
        # --strict — 警告也當錯誤；任何 direct/transitive dep 有 CVE 都會 fail
        run: pip-audit --strict -r requirements.txt

  # ===========================================================================
  # Stage 3: Build — 打包 ARM64 image 並推到 GHCR
  # 需要 test 和 security-scan 都過才會跑（因為 build 很貴，QEMU 模擬 ARM64 慢）
  # ===========================================================================
  build:
    name: Build & push ARM64 image
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU (for ARM64 cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute short SHA tag
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ci
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:sha-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # Stage 4: Integration test — 在真實 Jetson 上跑一次
  # 只在 push 到 main 才跑（PR 不佔用實體硬體）
  # ===========================================================================
  integration-test:
    name: Integration test (Jetson)
    runs-on: [self-hosted, linux, arm64, jetson]
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5

      - name: Login to GHCR on Jetson
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
            -u ${{ github.actor }} --password-stdin

      - name: Install pytest dependencies on Jetson
        run: pip install --user pytest==8.3.3 paho-mqtt==2.1.0

      - name: Run E2E integration test
        env:
          SHA_SHORT: ${{ github.sha }}
        run: |
          SHA=$(echo "$SHA_SHORT" | cut -c1-7)
          IMG="ghcr.io/${{ github.repository }}:sha-$SHA"
          IMAGE="$IMG" pytest tests/integration/ -v