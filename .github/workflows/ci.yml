name: CI
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - run: pip install ruff==0.6.9
      - run: ruff check . --output-format=github

  test:
    name: Pytest + coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install test deps
        run: |
          pip install \
            pytest==8.3.3 \
            pytest-cov==5.0.0 \
            pytest-mock==3.14.0 \
            opencv-python==4.10.0.84 \
            paho-mqtt==2.1.0
      - name: Run pytest with coverage gate
        run: |
          pytest tests/ \
            --ignore=tests/integration \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=90 \
            -v
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/

  security-scan:
    name: Bandit + pip-audit
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - run: pip install 'bandit[toml]==1.7.10' pip-audit==2.7.3
      - name: Bandit (Python SAST)
        run: bandit -r src/ -ll -c pyproject.toml
      - name: pip-audit (CVE scan)
        run: pip-audit --strict -r requirements.txt

  build:
    name: Build & push ARM64 image
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=short,prefix=sha-
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ci
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration-test:
    name: Integration test (Jetson)
    runs-on: [self-hosted, linux, arm64, jetson]
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR on Jetson
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Install pytest deps
        run: pip install --user pytest==8.3.3 paho-mqtt==2.1.0
      - name: Run integration test
        env:
          SHA_SHORT: ${{ github.sha }}
        run: |
          SHA=$(echo "$SHA_SHORT" | cut -c1-7)
          IMG="ghcr.io/${{ github.repository }}:sha-${SHA}"
          IMAGE="$IMG" pytest tests/integration/ -v
